<!DOCTYPE html>
<html>
<head>
<style>

body{
    margin:0;
    background:#d3d3d3;
}

.container{
    width:700px;
    height:400px;
    margin:80px auto;
    position:relative;
}

/* Common Card */
.card{
    width:200px;
    height:200px;
    position:absolute;
    // border-radius:10px;
}

/* Card 1 */
.card1{
    background:#4CAF50;
    left:20px;
    top:180px;
    z-index:1;
}

/* Card 2 */
.card2{
    background:#4c53af;
    left:100px;
    top:110px;
    z-index:2;
    visibility: hidden;
}

/* Card 3 */
.card3{
    background:#af6a4c;
    left:180px;
    top:30px;
    z-index:3;
}

/* Card 4 */
.card4{
    background:#af4c7d;
    left:250px;
    top:-30px;
    z-index:4;
}

</style>
</head>

<body>

<div class="container">

    <div class="card card1"></div>
    <div class="card card2"></div>
    <div class="card card3"></div>
    <div class="card card4"></div>

</div>

</body>
</html>
