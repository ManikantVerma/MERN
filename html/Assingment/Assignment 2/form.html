<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h1>FORMS</h1>

    <form>

        <label>Name</label><br>
        <input type="text" name="name" placeholder="Enter your name">
        <br><br>

        <label>Email-id</label><br>
        <input type="email" name="email" placeholder="Enter your email">
        <br><br>

        <label>Password</label><br>
        <input type="password" name="password">
        <br><br>

        <label>Language</label><br>
        <input type="checkbox" name="lang" value="HTML"> HTML
        <input type="checkbox" name="lang" value="CSS"> CSS
        <input type="checkbox" name="lang" value="JS"> JS
        <br><br>

        <label>Course</label><br>
        <input type="radio" name="course" value="Java Stack"> Java Stack
        <input type="radio" name="course" value="Data Science"> Data Science
        <input type="radio" name="course" value="MERN Stack"> MERN Stack
        <br><br>

        <label>Field</label><br>
        <select>
            <option>Select</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
        <br><br>

        <label>Describe Yourself</label><br>
        <textarea rows="5" cols="30" placeholder="Write something about yourself..."></textarea>
        <br><br>

        <label>Date</label><br>
        <input type="date">
        <br><br>

        <label>Phone No.</label><br>
        <input type="tel" placeholder="Enter phone number">
        <br><br>

        <input type="submit" value="Submit">

    </form>
 <br>
    <a href="table.html">Click Here For Table File</a>
</body>
</html>
